services:
  matrix-bot:
    build: .
    container_name: matrix-e2ee-bot
    restart: unless-stopped
    ports:
      - "5001:8000"
    volumes:
      - crypto_store:/app/data
    env_file:
      - .env
    environment:
      CRYPTO_STORE_PATH: /app/data/crypto_store
      SESSION_STORE_PATH: /app/data/sessions.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - ai-stack-network

volumes:
  crypto_store:
    driver: local

networks:
  ai-stack-network:
    external: true
